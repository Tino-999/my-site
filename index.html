<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tino Schuldt</title>

<style>
:root{
  --bg:#f6f6f3;
  --text:#202020;
  --muted:#6d6d6d;
  --line:#dfdfd8;
  --link:#2f5bd3;
  --card:#ffffff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,"Times New Roman",serif;
  line-height:1.55;
}

a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}

.page{
  width:min(920px,calc(100% - 32px));
  margin:48px auto 80px;
}

.hero{
  display:grid;
  grid-template-columns:1fr;
  gap:28px;
  padding-bottom:28px;
  border-bottom:1px solid var(--line);
}

h1{
  margin:0 0 8px;
  font-size:48px;
  font-weight:400;
  letter-spacing:-0.02em;
}

.subtitle{
  margin:0;
  color:var(--muted);
  font-size:24px;
  font-style:italic;
}

.intro{
  margin-top:20px;
  max-width:640px;
  font-size:19px;
}

.links-wrap{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:14px;
  margin-top:22px;
}

.links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.links a,
.field-links a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  font-size:18px;
}

.divider{
  color:var(--muted);
  font-size:24px;
  line-height:1;
  padding:0 2px;
}

.field-links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.field-links a{
  font-size:14px;
  padding:0 10px;
  min-width:42px;
  width:auto;
}

.section-title{
  margin:40px 0 10px;
  font-size:28px;
  font-weight:400;
}

.projects,
.articles{
  margin-top:10px;
}

.project,
.article{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:18px;
  padding:18px 0;
  border-top:1px solid var(--line);
}

.project:first-child,
.article:first-child{
  border-top:none;
}

.project img,
.article img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--line);
  filter:grayscale(100%);
}

.project-title,
.article-title{
  font-size:20px;
  margin:0 0 6px;
}

.project p,
.article p{
  margin:0;
  font-size:17px;
}

.footer{
  margin-top:44px;
  padding-top:20px;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:15px;
}

@media(max-width:720px){
  .hero{text-align:center}
  .links-wrap{justify-content:center}
  .links,
  .field-links{justify-content:center}
}
</style>
</head>

<body>

<main class="page">

<section class="hero">
<div>
<h1 id="name"></h1>
<p class="subtitle" id="tagline"></p>
<p class="intro" id="introText"></p>
<div class="links-wrap">
<div class="links" id="socialLinks"></div>
<span class="divider" aria-hidden="true">II</span>
<div class="field-links" id="fieldLinks"></div>
</div>
</div>
</section>

<section class="projects">
<h2 class="section-title">Projects</h2>
<div id="projects"></div>
</section>

<section class="articles">
<h2 class="section-title">Articles</h2>
<div id="articles"></div>
</section>

<footer class="footer">
<span id="footerText"></span>
</footer>

</main>

<script>

const profile={

name:"Tino Schuldt",

tagline:"I learn and build across industry, space, art, culture, software, hardware and ideas.",

intro:"",

footer:"",

links:[
{label:"X",href:"https://x.com/SchuldtTino"},
{label:"GH",href:"https://github.com/Tino-999/"},
{label:"in",href:"https://www.linkedin.com/in/tinoschuldt/"},
{label:"✉",href:"mailto:tinoschuldt100@gmail.com"}
],

fields:[
{label:"Math",href:"/mathematik.html"},
{label:"Prog",href:"/programmierung.html"},
{label:"AI",href:"/ai.html"},
{label:"Phil",href:"/philosophie.html"},
{label:"Space",href:"/weltraum.html"},
{label:"Art",href:"/kunst.html"},
{label:"Culture",href:"/kultur.html"}
],

projects:[

{
name:"Space Settlement Index",
link:"https://space-settlement.net/",
image:"https://spacesettlement-api.tinoschuldt100.workers.dev/images/7e022df5-3185-425e-8f39-cf1d03758fea",
desc:"A small side project to train my programming skills while also organizing my research on the history of space settlement."
},

{
name:"Ventarix",
link:"https://www.ventarix.ch",
image:"ventarix_logo.jpg",
desc:"An exciting investment in a very talented team working on the digitalization of veterinary medicine."
},

{
name:"Acupet",
link:"https://acupet.ch",
image:"icon.png",
desc:"I helped inspire the early development of the Acupet app and accompanied parts of the long and often rocky path toward publication."
}
],

articles:[

{
name:"The Making of Modern AI",
link:"/modern-ai.html",
image:"/images/ai/hinton.jpg",
desc:"A compact overview of the key conceptual jumps, papers, and people from the first formal neuron to modern language models."
},
  
{
name:"JavaScript Keywords",
link:"/javascript.html",
image:"/images/javascript.png",
desc:"A small reduced page that frames the core JavaScript keywords as the story of a program."
}

]

};


// Header

document.getElementById("name").textContent=profile.name;
document.getElementById("tagline").textContent=profile.tagline;
document.getElementById("introText").textContent=profile.intro;
document.getElementById("footerText").textContent=profile.footer;


// Social Links

const linksEl=document.getElementById("socialLinks");

profile.links.forEach(link=>{
const a=document.createElement("a");
a.href=link.href;
a.target="_blank";
a.rel="noopener noreferrer";
a.textContent=link.label;
linksEl.appendChild(a);
});


// Learning Fields

const fieldLinksEl=document.getElementById("fieldLinks");

profile.fields.forEach(field=>{
const a=document.createElement("a");
a.href=field.href;
a.textContent=field.label;
fieldLinksEl.appendChild(a);
});


// Projects

const projectsEl=document.getElementById("projects");

profile.projects.forEach(p=>{

const row=document.createElement("div");
row.className="project";

const img=document.createElement("img");
img.src=p.image;

const text=document.createElement("div");

const title=document.createElement("a");
title.href=p.link;
title.className="project-title";
title.textContent=p.name;
title.target="_blank";

const desc=document.createElement("p");
desc.textContent=p.desc;

text.appendChild(title);
text.appendChild(desc);

row.appendChild(img);
row.appendChild(text);

projectsEl.appendChild(row);

});


// Articles

const articlesEl=document.getElementById("articles");

profile.articles.forEach(aItem=>{

const row=document.createElement("div");
row.className="article";

const img=document.createElement("img");
img.src=aItem.image;

const text=document.createElement("div");

const title=document.createElement("a");
title.href=aItem.link;
title.className="article-title";
title.textContent=aItem.name;

const desc=document.createElement("p");
desc.textContent=aItem.desc;

text.appendChild(title);
text.appendChild(desc);

row.appendChild(img);
row.appendChild(text);

articlesEl.appendChild(row);

});

</script>

</body>
</html>
