<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tino Schuldt</title>

<style>
:root{
  --bg:#f6f6f3;
  --text:#202020;
  --muted:#6d6d6d;
  --line:#dfdfd8;
  --link:#2f5bd3;
  --card:#ffffff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,"Times New Roman",serif;
  line-height:1.55;
}

a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}

.page{
  width:min(920px,calc(100% - 32px));
  margin:48px auto 80px;
}

.hero{
  display:grid;
  grid-template-columns:1fr;
  gap:28px;
  padding-bottom:28px;
  border-bottom:1px solid var(--line);
}

h1{
  margin:0 0 8px;
  font-size:48px;
  font-weight:400;
  letter-spacing:-0.02em;
}

.subtitle{
  margin:0;
  color:var(--muted);
  font-size:24px;
  font-style:italic;
}

.intro{
  margin-top:20px;
  max-width:640px;
  font-size:19px;
}

.links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
}

.links a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  font-size:18px;
}

.projects{margin-top:40px}

.project{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:18px;
  padding:18px 0;
  border-top:1px solid var(--line);
}

.project:first-child{
  border-top:none;
}

.project img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--line);
  filter:grayscale(100%);
}

.project-title{
  font-size:20px;
  margin:0 0 6px;
}

.project p{
  margin:0;
  font-size:17px;
}

.timeline{
  margin-top:36px;
}

.item{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:24px;
  padding:20px 0;
  border-top:1px solid var(--line);
}

.year{
  color:var(--muted);
  font-size:15px;
  padding-top:4px;
}

.content h2{
  margin:0 0 10px;
  font-size:28px;
  font-weight:400;
}

.content p{
  margin:0 0 12px;
  font-size:18px;
}

.content ul{
  margin:8px 0 0 22px;
  padding:0;
  font-size:17px;
}

.footer{
  margin-top:44px;
  padding-top:20px;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:15px;
}

@media(max-width:720px){
  .hero{text-align:center}
  .links{justify-content:center}
  .item{grid-template-columns:1fr}
}
</style>
</head>

<body>

<main class="page">

<section class="hero">
<div>
<h1 id="name"></h1>
<p class="subtitle" id="tagline"></p>
<p class="intro" id="introText"></p>
<div class="links" id="socialLinks"></div>
</div>
</section>

<section id="projects" class="projects"></section>

<section class="timeline" id="timeline"></section>

<footer class="footer">
<span id="footerText"></span>
</footer>

</main>

<script>

const profile={

name:"Tino Schuldt",

tagline:"I learn and build across industry, space, art, culture, software, hardware and ideas.",

intro:"",

footer:"",

links:[
{label:"X",href:"https://x.com/SchuldtTino"},
{label:"GH",href:"https://github.com/Tino-999/"},
{label:"in",href:"https://www.linkedin.com/in/tinoschuldt/"},
{label:"✉",href:"mailto:tinoschuldt100@gmail.com"}
],

projects:[
{
name:"Space Settlement Index",
link:"https://space-settlement.net/",
image:"https://spacesettlement-api.tinoschuldt100.workers.dev/images/7e022df5-3185-425e-8f39-cf1d03758fea",
desc:"A small side project to train my programming skills while also organizing my research on the history of space settlement."
}

{
name:"Ventarix",
link:"https://www.ventarix.ch",
image:"ventarix_logo.jpg",
desc:"An exciting investment in a very talented team working on the digitalization of veterinary medicine."
}
],

};


// Header

document.getElementById("name").textContent=profile.name;
document.getElementById("tagline").textContent=profile.tagline;
document.getElementById("introText").textContent=profile.intro;
document.getElementById("footerText").textContent=profile.footer;


// Social Links

const linksEl=document.getElementById("socialLinks");

profile.links.forEach(link=>{
const a=document.createElement("a");
a.href=link.href;
a.target="_blank";
a.textContent=link.label;
linksEl.appendChild(a);
});


// Projects

const projectsEl=document.getElementById("projects");

profile.projects.forEach(p=>{

const row=document.createElement("div");
row.className="project";

const img=document.createElement("img");
img.src=p.image;

const text=document.createElement("div");

const title=document.createElement("a");
title.href=p.link;
title.className="project-title";
title.textContent=p.name;
title.target="_blank";

const desc=document.createElement("p");
desc.textContent=p.desc;

text.appendChild(title);
text.appendChild(desc);

row.appendChild(img);
row.appendChild(text);

projectsEl.appendChild(row);

});


// Timeline

const timelineEl=document.getElementById("timeline");

profile.timeline.forEach(entry=>{

const item=document.createElement("article");
item.className="item";

const year=document.createElement("div");
year.className="year";
year.textContent=entry.year;

const content=document.createElement("div");
content.className="content";

const title=document.createElement("h2");
title.textContent=entry.title;

const body=document.createElement("p");
body.textContent=entry.body;

const ul=document.createElement("ul");

entry.bullets.forEach(point=>{
const li=document.createElement("li");
li.textContent=point;
ul.appendChild(li);
});

content.appendChild(title);
content.appendChild(body);
content.appendChild(ul);

item.appendChild(year);
item.appendChild(content);

timelineEl.appendChild(item);

});

</script>

</body>
</html>
