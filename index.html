<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tino Schuldt</title>

<style>
:root{
  --bg:#f6f6f3;
  --text:#202020;
  --muted:#6d6d6d;
  --line:#dfdfd8;
  --link:#2f5bd3;
  --card:#ffffff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,"Times New Roman",serif;
  line-height:1.55;
}

a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}

.page{
  width:min(920px,calc(100% - 32px));
  margin:48px auto 80px;
}

.hero{
  display:grid;
  grid-template-columns:1fr;
  gap:28px;
  padding-bottom:28px;
  border-bottom:1px solid var(--line);
}

h1{
  margin:0 0 8px;
  font-size:48px;
  font-weight:400;
  letter-spacing:-0.02em;
}

.subtitle{
  margin:0;
  color:var(--muted);
  font-size:24px;
  font-style:italic;
}

.intro{
  margin-top:20px;
  max-width:640px;
  font-size:19px;
}

.links{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
}

.links a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  font-size:18px;
}

.section-title{
  margin:0 0 10px;
  font-size:28px;
  font-weight:400;
}

.projects,
.articles{
  margin-top:40px;
}

.project,
.article{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:18px;
  padding:18px 0;
  border-top:1px solid var(--line);
}

.project:first-child,
.article:first-child{
  border-top:none;
}

.project img,
.article img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--line);
  filter:grayscale(100%);
  background:var(--card);
}

.project-title,
.article-title{
  display:inline-block;
  font-size:20px;
  margin:0 0 6px;
}

.project p,
.article p{
  margin:0;
  font-size:17px;
}

.footer{
  margin-top:44px;
  padding-top:20px;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:15px;
}

@media(max-width:720px){
  .hero{text-align:center}
  .links{justify-content:center}
  .project,
  .article{
    grid-template-columns:80px 1fr;
  }
}
</style>
</head>

<body>

<main class="page">

<section class="hero">
  <div>
    <h1 id="name"></h1>
    <p class="subtitle" id="tagline"></p>
    <p class="intro" id="introText"></p>
    <div class="links" id="socialLinks"></div>
  </div>
</section>

<section class="projects">
  <h2 class="section-title">Projects</h2>
  <div id="projects"></div>
</section>

<section class="articles">
  <h2 class="section-title">Articles</h2>
  <div id="articles"></div>
</section>

<footer class="footer">
  <span id="footerText"></span>
</footer>

</main>

<script>
const profile = {
  name:"Tino Schuldt",
  tagline:"I learn and build across industry, space, art, culture, software, hardware and ideas.",
  intro:"",
  footer:"",
  links:[
    {label:"X",href:"https://x.com/SchuldtTino"},
    {label:"GH",href:"https://github.com/Tino-999/"},
    {label:"in",href:"https://www.linkedin.com/in/tinoschuldt/"},
    {label:"✉",href:"mailto:tinoschuldt100@gmail.com"}
  ],
  projects:[
    {
      name:"Space Settlement Index",
      link:"https://space-settlement.net/",
      image:"https://spacesettlement-api.tinoschuldt100.workers.dev/images/7e022df5-3185-425e-8f39-cf1d03758fea",
      desc:"A small side project to train my programming skills while also organizing my research on the history of space settlement."
    },
    {
      name:"Ventarix",
      link:"https://www.ventarix.ch",
      image:"ventarix_logo.jpg",
      desc:"An exciting investment in a very talented team working on the digitalization of veterinary medicine."
    },
    {
      name:"Acupet",
      link:"https://acupet.ch",
      image:"icon.png",
      desc:"I helped inspire the early development of the Acupet app and accompanied parts of the long and often rocky path toward publication. A steep learning curve."
    }
  ],
  articles:[
    {
      name:"The Making of Modern AI",
      link:"/modern-ai.html",
      image:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Geoffrey_Hinton_at_UBC.jpg/160px-Geoffrey_Hinton_at_UBC.jpg",
      desc:"A compact overview of the key conceptual jumps, papers, and people from the first formal neuron to modern language models."
    }
  ]
};

document.getElementById("name").textContent = profile.name;
document.getElementById("tagline").textContent = profile.tagline;
document.getElementById("introText").textContent = profile.intro;
document.getElementById("footerText").textContent = profile.footer;

const linksEl = document.getElementById("socialLinks");
profile.links.forEach(link => {
  const a = document.createElement("a");
  a.href = link.href;
  a.target = "_blank";
  a.textContent = link.label;
  linksEl.appendChild(a);
});

const projectsEl = document.getElementById("projects");
profile.projects.forEach(p => {
  const row = document.createElement("div");
  row.className = "project";

  const img = document.createElement("img");
  img.src = p.image;
  img.alt = p.name;

  const text = document.createElement("div");

  const title = document.createElement("a");
  title.href = p.link;
  title.className = "project-title";
  title.textContent = p.name;
  title.target = "_blank";

  const desc = document.createElement("p");
  desc.textContent = p.desc;

  text.appendChild(title);
  text.appendChild(desc);
  row.appendChild(img);
  row.appendChild(text);
  projectsEl.appendChild(row);
});

const articlesEl = document.getElementById("articles");
profile.articles.forEach(item => {
  const row = document.createElement("div");
  row.className = "article";

  const img = document.createElement("img");
  img.src = item.image;
  img.alt = item.name;

  const text = document.createElement("div");

  const title = document.createElement("a");
  title.href = item.link;
  title.className = "article-title";
  title.textContent = item.name;

  const desc = document.createElement("p");
  desc.textContent = item.desc;

  text.appendChild(title);
  text.appendChild(desc);
  row.appendChild(img);
  row.appendChild(text);
  articlesEl.appendChild(row);
});
</script>

</body>
</html>
